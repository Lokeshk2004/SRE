apiVersion: v1
kind: Service
metadata:
  name: logstash-service
  namespace: logging
  labels:
    app: logstash
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
      protocol: TCP
    - name: tcp-input
      port: 5000
      targetPort: 5000
      protocol: TCP
    - name: api
      port: 9600
      targetPort: 9600
      protocol: TCP
