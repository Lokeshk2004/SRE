apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: logging
  labels:
    app: filebeat
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"
          - drop_event:
              when:
                or:
                  - contains:
                      kubernetes.namespace: "kube-system"
                  - contains:
                      kubernetes.namespace: "ingress-nginx"

    output.logstash:
      hosts: ["logstash-service.logging.svc.cluster.local:5044"]
      bulk_max_size: 1024
      timeout: 30s

    logging.level: info
    logging.to_stderr: true
    logging.metrics.enabled: false

    processors:
      - add_host_metadata:
          when.not.contains.tags: forwarded
      - add_cloud_metadata: ~
