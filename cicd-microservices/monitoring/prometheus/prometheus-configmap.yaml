apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              service: 'prometheus'

      - job_name: 'user-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['user-service.microservices.svc.cluster.local:3001']
            labels:
              service: 'user-service'
              namespace: 'microservices'

      - job_name: 'order-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['order-service.microservices.svc.cluster.local:3002']
            labels:
              service: 'order-service'
              namespace: 'microservices'

      - job_name: 'payment-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['payment-service.microservices.svc.cluster.local:3003']
            labels:
              service: 'payment-service'
              namespace: 'microservices'
